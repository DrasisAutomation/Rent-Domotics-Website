<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Food Ordering</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1D1B1E;
            --accent: #F26F1E;
            --card-radius: 16px;
            --gap: 18px;
            --shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
            --glass: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ==================================
           COMMON STYLES
        ================================== */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .title {
            font-size: 48px;
            font-weight: 300;
            color: white;
            font-family: "Inter", sans-serif;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 0;
        }

        .back-button, .action-button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            position: static !important;
            margin-top: 6px;
        }

        .back-button:hover, .action-button:hover {
            background: #e05e1a;
            transform: translateY(-2px);
        }

        .floating-cart-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .floating-cart-btn:hover {
            transform: translateX(-50%) translateY(-3px);
        }

        .cart-count {
            background: white;
            color: var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        /* ==================================
           MENU PAGE STYLES
        ================================== */
        .search-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            display: flex;
            flex-direction: column;
            padding: 16px;
            border-radius: var(--card-radius);
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.06);
            overflow: hidden;
            gap: 12px;
            height: 100%;
            opacity: 0;
            transform: translateY(20px);
            animation: pop 0.5s forwards;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
        }

        .thumb {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .product-title {
            font-weight: 700;
            font-size: 18px;
            color: #000;
        }

        .product-desc {
            font-size: 14px;
            color: #333;
        }

        .product-price {
            font-weight: 700;
            font-size: 18px;
            color: #000;
            margin-top: 8px;
        }

        .card-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto;
        }

        .add-to-cart {
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 600;
            background: #fff;
            color: #000;
            border: 1px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
            width: 100%;
            transition: 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .add-to-cart:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        /* ==================================
           CART PAGE STYLES
        ================================== */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            gap: 16px;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--accent);
            font-weight: 600;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ffffff;
            color: #000;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .quantity-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .quantity-display {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
            color: #fff;
        }

        .remove-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .cart-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .summary-total {
            font-weight: 700;
            font-size: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 12px;
            margin-top: 12px;
        }

        .continue-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }

        .continue-btn:hover {
            background: #e05e1a;
            transform: translateY(-2px);
        }

        .continue-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================================
           CONFIRMATION PAGE STYLES
        ================================== */
        .confirmation-message {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-top: 20px;
        }

        .confirmation-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .confirmation-title {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .confirmation-details {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        /* ==================================
           ANIMATIONS
        ================================== */
        @keyframes pop {
            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ==================================
           RESPONSIVE DESIGN
        ================================== */
        @media (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
            .title {
                font-size: 36px;
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 16px;
            }
            .title {
                font-size: 32px;
            }
            .subtitle {
                font-size: 16px;
            }
            .header {
                padding: 16px;
                gap: 8px;
            }
            .back-button, .action-button {
                padding: 8px 18px;
                font-size: 13px;
            }
            .container {
                padding: 10px;
            }
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
            .cart-item-controls {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .title {
                font-size: 28px;
            }
            body {
                padding: 10px;
            }
            .header {
                padding: 14px;
                gap: 6px;
            }
            .subtitle {
                font-size: 15px;
            }
            .back-button, .action-button {
                padding: 8px 16px;
                font-size: 12px;
            }
            .floating-cart-btn {
                bottom: 20px;
                padding: 14px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MENU PAGE -->
        <div id="menuPage" class="page active">
            <header class="header">
                <h1 class="title">HOTEL DINING</h1>
                <div class="subtitle">Room <span id="roomNumber">G01</span> • Food Ordering</div>
            </header>

            <div class="search-container">
                <input type="text" class="search-bar" id="searchBar" placeholder="Search for dishes...">
            </div>

            <main class="products-grid" id="productsGrid" aria-live="polite">
                <!-- Products will be dynamically inserted here -->
            </main>
        </div>

        <!-- CART PAGE -->
        <div id="cartPage" class="page">
            <header class="header">
                <h1 class="title">YOUR CART</h1>
                <div class="subtitle">Room <span id="cartRoomNumber">G01</span></div>
                <button class="back-button" id="backToMenuFromCart">
                    Back To Menu
                </button>
            </header>

            <div class="cart-items" id="cartItems">
                <!-- Cart items will be dynamically inserted here -->
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total:</span>
                    <span id="totalAmount">₹0</span>
                </div>
                <button class="continue-btn" id="continueToConfirm">Continue to Confirm Order</button>
            </div>
        </div>

        <!-- CONFIRMATION PAGE -->
        <div id="confirmationPage" class="page">
            <header class="header">
                <h1 class="title">ORDER CONFIRMED</h1>
                <div class="subtitle">Room <span id="confirmRoomNumber">G01</span></div>
                <button class="back-button" id="backToMenuFromConfirm">
                    Back To Menu
                </button>
            </header>

            <div class="confirmation-message">
                <div class="confirmation-icon">✓</div>
                <h2 class="confirmation-title">Thank You For Your Order!</h2>
                <p>Your food will be delivered to your room shortly.</p>
                <p>You will be redirected to the menu in <span id="countdown">3</span> seconds.</p>
            </div>

            <div class="confirmation-details" id="orderDetails">
                <!-- Order details will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <!-- Floating Cart Button (shown on menu page) -->
    <button class="floating-cart-btn" id="floatingCartBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        View Cart
        <span class="cart-count" id="cartCount">0</span>
    </button>

    <script>
        // State management
        const state = {
            currentPage: 'menu',
            roomNumber: 'G01',
            cart: JSON.parse(localStorage.getItem('cart')) || [],
            products: [
                {
                    id: 1,
                    name: "Classic Burger",
                    desc: "Beef patty with lettuce, tomato, cheese and special sauce",
                    price: 299,
                    img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YnVyZ2VyfGVufDB8fDB8fHww&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 2,
                    name: "Margherita Pizza",
                    desc: "Fresh tomatoes, mozzarella, basil and olive oil",
                    price: 449,
                    img: "https://images.unsplash.com/photo-1604068549290-dea0e4a305ca?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8cGl6emF8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 3,
                    name: "Caesar Salad",
                    desc: "Crisp romaine with parmesan, croutons and Caesar dressing",
                    price: 199,
                    img: "https://images.unsplash.com/photo-1546793665-c74683f339c1?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8Y2Flc2FyJTIwc2FsYWR8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 4,
                    name: "Grilled Salmon",
                    desc: "Atlantic salmon with lemon butter sauce and seasonal vegetables",
                    price: 699,
                    img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGdyaWxsZWQlMjBzYWxtb258ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 5,
                    name: "Pasta Carbonara",
                    desc: "Spaghetti with pancetta, eggs, parmesan and black pepper",
                    price: 349,
                    img: "https://images.unsplash.com/photo-1621996346565-e3dbc353d2e5?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8cGFzdGElMjBjYXJib25hcmF8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 6,
                    name: "Chocolate Lava Cake",
                    desc: "Warm chocolate cake with a molten center and vanilla ice cream",
                    price: 179,
                    img: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Y2hvY29sYXRlJTIwbGF2YSUyMGNha2V8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 7,
                    name: "Chicken Tikka Masala",
                    desc: "Tender chicken in a creamy tomato and spice sauce with basmati rice",
                    price: 399,
                    img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8Y2hpY2tlbiUyMHRpa2thJTIwbWFzYWxhfGVufDB8fDB8fHww&auto=format&fit=crop&w=500&q=60"
                },
                {
                    id: 8,
                    name: "Fruit Smoothie",
                    desc: "Blend of seasonal fruits, yogurt and honey",
                    price: 149,
                    img: "https://images.unsplash.com/photo-1505252585461-04db1a846087?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8ZnJ1aXQlMjBzbW9vdGhpZXxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60"
                }
            ],
            filteredProducts: []
        };

        // DOM Elements
        const pages = {
            menu: document.getElementById('menuPage'),
            cart: document.getElementById('cartPage'),
            confirmation: document.getElementById('confirmationPage')
        };

        const floatingCartBtn = document.getElementById('floatingCartBtn');
        const cartCount = document.getElementById('cartCount');
        const searchBar = document.getElementById('searchBar');
        const productsGrid = document.getElementById('productsGrid');
        const cartItems = document.getElementById('cartItems');
        const cartRoomNumber = document.getElementById('cartRoomNumber');
        const confirmRoomNumber = document.getElementById('confirmRoomNumber');
        const roomNumber = document.getElementById('roomNumber');
        const subtotalElement = document.getElementById('subtotal');
        const totalAmountElement = document.getElementById('totalAmount');
        const continueToConfirm = document.getElementById('continueToConfirm');
        const orderDetails = document.getElementById('orderDetails');
        const countdownElement = document.getElementById('countdown');

        // Initialize
        function init() {
            state.filteredProducts = [...state.products];
            renderProducts();
            updateCartDisplay();
            updateRoomNumbers();
            
            // Set up event listeners
            setupEventListeners();
        }

        // Set up event listeners
        function setupEventListeners() {
            // Menu page
            searchBar.addEventListener('input', filterProducts);
            
            // Navigation buttons
            document.getElementById('backToMenuFromCart').addEventListener('click', () => showPage('menu'));
            document.getElementById('backToMenuFromConfirm').addEventListener('click', () => {
                clearCart();
                showPage('menu');
            });
            
            // Floating cart button
            floatingCartBtn.addEventListener('click', () => {
                if (state.cart.length > 0) {
                    showPage('cart');
                } else {
                    alert('Your cart is empty. Please add some items first.');
                }
            });
            
            // Continue to confirmation button
            continueToConfirm.addEventListener('click', () => {
                if (state.cart.length > 0) {
                    showPage('confirmation');
                    renderOrderDetails();
                    startCountdown();
                }
            });
        }

        // Page navigation
        function showPage(pageName) {
            // Hide all pages
            Object.values(pages).forEach(page => page.classList.remove('active'));
            
            // Show the requested page
            pages[pageName].classList.add('active');
            state.currentPage = pageName;
            
            // Show/hide floating cart button
            floatingCartBtn.style.display = pageName === 'menu' ? 'flex' : 'none';
            
            // Update cart display if showing cart page
            if (pageName === 'cart') {
                renderCartItems();
                updateCartSummary();
            }
            
            // Update room numbers
            updateRoomNumbers();
        }

        // Update room numbers on all pages
        function updateRoomNumbers() {
            roomNumber.textContent = state.roomNumber;
            cartRoomNumber.textContent = state.roomNumber;
            confirmRoomNumber.textContent = state.roomNumber;
        }

        // Product rendering
        function renderProducts() {
            productsGrid.innerHTML = '';
            state.filteredProducts.forEach((product, index) => {
                const card = createProductCard(product, index);
                productsGrid.appendChild(card);
            });
        }

        function createProductCard(product, idx) {
            const card = document.createElement('article');
            card.className = 'card';
            card.style.animationDelay = `${idx * 0.1}s`;

            // Image
            const thumb = document.createElement('div');
            thumb.className = 'thumb';
            thumb.style.backgroundImage = `url('${product.img}')`;

            // Content container
            const content = document.createElement('div');
            content.className = 'content';

            // Title
            const title = document.createElement('h2');
            title.className = 'product-title';
            title.textContent = product.name;

            // Description
            const desc = document.createElement('p');
            desc.className = 'product-desc';
            desc.textContent = product.desc;

            // Price
            const price = document.createElement('div');
            price.className = 'product-price';
            price.textContent = `₹${product.price}`;

            content.appendChild(title);
            content.appendChild(desc);
            content.appendChild(price);

            // Footer with add to cart
            const footer = document.createElement('div');
            footer.className = 'card-footer';

            // Add to cart button
            const addToCartBtn = document.createElement('button');
            addToCartBtn.className = 'add-to-cart';
            addToCartBtn.textContent = 'Add to Cart';
            addToCartBtn.addEventListener('click', () => addToCart(product.id));

            footer.appendChild(addToCartBtn);

            // Assemble card
            card.appendChild(thumb);
            card.appendChild(content);
            card.appendChild(footer);

            return card;
        }

        // Cart functionality
        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            const existingItem = state.cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                state.cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    img: product.img,
                    quantity: 1
                });
            }

            updateCart();
        }

        function increaseQuantity(productId) {
            const existingItem = state.cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            }
            updateCart();
            renderCartItems();
            updateCartSummary();
        }

        function decreaseQuantity(productId) {
            const existingItem = state.cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity -= 1;
                if (existingItem.quantity <= 0) {
                    state.cart.splice(state.cart.indexOf(existingItem), 1);
                }
            }
            updateCart();
            renderCartItems();
            updateCartSummary();
        }

        function removeFromCart(productId) {
            const itemIndex = state.cart.findIndex(item => item.id === productId);
            if (itemIndex > -1) {
                state.cart.splice(itemIndex, 1);
            }
            updateCart();
            renderCartItems();
            updateCartSummary();
        }

        function updateCart() {
            // Update cart display
            updateCartDisplay();
            
            // Save to localStorage
            localStorage.setItem('cart', JSON.stringify(state.cart));
        }

        function updateCartDisplay() {
            const totalItems = state.cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
        }

        function renderCartItems() {
            cartItems.innerHTML = '';

            if (state.cart.length === 0) {
                const emptyMessage = document.createElement('div');
                emptyMessage.className = 'empty-cart';
                emptyMessage.textContent = 'Your cart is empty';
                emptyMessage.style.textAlign = 'center';
                emptyMessage.style.padding = '40px';
                emptyMessage.style.color = 'rgba(255,255,255,0.7)';
                cartItems.appendChild(emptyMessage);
                continueToConfirm.disabled = true;
                return;
            }

            continueToConfirm.disabled = false;

            state.cart.forEach(item => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';

                const image = document.createElement('div');
                image.className = 'cart-item-image';
                image.style.backgroundImage = `url('${item.img}')`;

                const details = document.createElement('div');
                details.className = 'cart-item-details';

                const name = document.createElement('div');
                name.className = 'cart-item-name';
                name.textContent = item.name;

                const price = document.createElement('div');
                price.className = 'cart-item-price';
                price.textContent = `₹${item.price}`;

                details.appendChild(name);
                details.appendChild(price);

                const controls = document.createElement('div');
                controls.className = 'cart-item-controls';

                const quantityControls = document.createElement('div');
                quantityControls.className = 'quantity-controls';

                const minusBtn = document.createElement('button');
                minusBtn.className = 'quantity-btn';
                minusBtn.textContent = '-';
                minusBtn.addEventListener('click', () => decreaseQuantity(item.id));

                const quantityDisplay = document.createElement('span');
                quantityDisplay.className = 'quantity-display';
                quantityDisplay.textContent = item.quantity;

                const plusBtn = document.createElement('button');
                plusBtn.className = 'quantity-btn';
                plusBtn.textContent = '+';
                plusBtn.addEventListener('click', () => increaseQuantity(item.id));

                quantityControls.appendChild(minusBtn);
                quantityControls.appendChild(quantityDisplay);
                quantityControls.appendChild(plusBtn);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.textContent = 'Remove';
                removeBtn.addEventListener('click', () => removeFromCart(item.id));

                controls.appendChild(quantityControls);
                controls.appendChild(removeBtn);

                cartItem.appendChild(image);
                cartItem.appendChild(details);
                cartItem.appendChild(controls);

                cartItems.appendChild(cartItem);
            });
        }

        function updateCartSummary() {
            const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal;

            subtotalElement.textContent = `₹${subtotal}`;
            totalAmountElement.textContent = `₹${total}`;
        }

        // Confirmation page functionality
        function renderOrderDetails() {
            orderDetails.innerHTML = '';

            const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal;

            const orderList = document.createElement('div');

            if (state.cart.length === 0) {
                const emptyMessage = document.createElement('div');
                emptyMessage.textContent = 'No items in order';
                emptyMessage.style.textAlign = 'center';
                emptyMessage.style.padding = '20px';
                emptyMessage.style.color = 'rgba(255,255,255,0.7)';
                orderDetails.appendChild(emptyMessage);
                return;
            }

            state.cart.forEach(item => {
                const itemRow = document.createElement('div');
                itemRow.className = 'summary-row';

                const itemName = document.createElement('span');
                itemName.textContent = `${item.quantity}x ${item.name}`;

                const itemTotal = document.createElement('span');
                itemTotal.textContent = `₹${(item.price * item.quantity)}`;

                itemRow.appendChild(itemName);
                itemRow.appendChild(itemTotal);
                orderList.appendChild(itemRow);
            });

            const subtotalRow = document.createElement('div');
            subtotalRow.className = 'summary-row';
            subtotalRow.innerHTML = `<span>Subtotal:</span><span>₹${subtotal}</span>`;

            const totalRow = document.createElement('div');
            totalRow.className = 'summary-row summary-total';
            totalRow.innerHTML = `<span>Total:</span><span>₹${total}</span>`;

            orderDetails.appendChild(orderList);
            orderDetails.appendChild(subtotalRow);
            orderDetails.appendChild(totalRow);
        }

        function startCountdown() {
            let countdown = 5;
            countdownElement.textContent = countdown;

            const timer = setInterval(() => {
                countdown--;
                countdownElement.textContent = countdown;

                if (countdown <= 0) {
                    clearInterval(timer);
                    clearCart();
                    showPage('menu');
                }
            }, 1000);
        }

        function clearCart() {
            state.cart = [];
            localStorage.removeItem('cart');
            updateCartDisplay();
        }

        // Search functionality
        function filterProducts() {
            const searchTerm = searchBar.value.toLowerCase();

            if (searchTerm === '') {
                state.filteredProducts = [...state.products];
            } else {
                state.filteredProducts = state.products.filter(product =>
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.desc.toLowerCase().includes(searchTerm)
                );
            }

            renderProducts();
        }

        // Initialize the app
        init();
    </script>
</body>
</html>
