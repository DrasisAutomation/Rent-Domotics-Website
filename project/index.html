<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Your existing styles remain the same */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --muted-foreground: 240 5% 64.9%;
      --glow-primary: 280 100% 70%;
      --glow-secondary: 200 100% 60%;
      --card-bg: 240 10% 8%;
      --input-bg: 240 10% 12%;
      --border-color: 240 5% 18%;
      --accent: 280 100% 70%;
      --accent-secondary: 200 100% 60%;
      --success: 142 76% 36%;
      --error: 0 84% 60%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .otp-box {
      display: inline-block !important;
      visibility: visible !important;
      opacity: 1 !important;
      background: hsla(var(--input-bg), 0.5) !important;
      border: 1px solid hsla(var(--border-color), 0.5) !important;
      color: hsl(var(--foreground)) !important;
      text-align: center !important;
    }

    .otp-boxes {
      display: flex !important;
      gap: 0.625rem !important;
      justify-content: center !important;
      margin-bottom: 1.25rem !important;
    }
    
    .page {
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      top: -10%;
      left: -10%;
      background: radial-gradient(circle at center,
          hsla(280, 100%, 70%, 0.25) 0%,
          hsla(200, 100%, 60%, 0.1) 40%,
          transparent 70%);
      animation: float1 20s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle at center,
          hsla(200, 100%, 60%, 0.2) 0%,
          hsla(280, 100%, 70%, 0.08) 40%,
          transparent 70%);
      animation: float2 15s ease-in-out infinite;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center,
          hsla(260, 100%, 65%, 0.15) 0%,
          transparent 60%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(50px, -30px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, 40px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
    }

    .grid-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.02;
      background-image:
        linear-gradient(hsl(var(--foreground)) 1px, transparent 1px),
        linear-gradient(90deg, hsl(var(--foreground)) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .bottom-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8rem;
      background: linear-gradient(to top, hsl(var(--background)), transparent);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 26rem;
      margin: 0 auto;
      animation: fadeInUp 0.6s ease-out;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: hsla(var(--card-bg), 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid hsla(0, 0%, 100%, 0.08);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow:
        0 0 0 1px hsla(0, 0%, 100%, 0.05) inset,
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 80px -20px hsla(280, 100%, 70%, 0.15);
    }

    @media (max-width: 480px) {
      .glass-card {
        padding: 1.5rem;
        border-radius: 1rem;
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, hsla(280, 100%, 70%, 0.15), hsla(200, 100%, 60%, 0.15));
      border: 1px solid hsla(280, 100%, 70%, 0.2);
      margin-bottom: 1.25rem;
      position: relative;
    }

    .icon-container::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 1rem;
      background: linear-gradient(135deg, hsla(280, 100%, 70%, 0.3), hsla(200, 100%, 60%, 0.1));
      z-index: -1;
      filter: blur(8px);
      opacity: 0.5;
    }

    .icon-container svg {
      width: 1.75rem;
      height: 1.75rem;
      color: hsl(var(--foreground));
      stroke-width: 1.5;
    }

    .title {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, hsl(var(--foreground)) 0%, hsla(var(--foreground), 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: hsl(var(--muted-foreground));
      font-size: 0.9375rem;
    }

    /* Login Method Toggle */
    .login-methods {
      display: flex;
      gap: 0.375rem;
      margin-bottom: 1.75rem;
      padding: 0.25rem;
      background: hsla(var(--input-bg), 0.6);
      border-radius: 0.75rem;
      border: 1px solid hsla(var(--border-color), 0.5);
    }

    .method-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: transparent;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      color: hsl(var(--muted-foreground));
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .method-btn svg {
      width: 1.125rem;
      height: 1.125rem;
      stroke-width: 2;
    }

    .method-btn.active {
      background: hsla(0, 0%, 100%, 0.1);
      color: hsl(var(--foreground));
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .method-btn:hover:not(.active) {
      background: hsla(0, 0%, 100%, 0.05);
      color: hsl(var(--foreground));
    }

    /* Google Button */
    .google-btn-wrapper {
      animation: fadeIn 0.3s ease-out;
    }

    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.9375rem 1.5rem;
      background: hsla(0, 0%, 100%, 0.05);
      border: 1px solid hsla(0, 0%, 100%, 0.1);
      border-radius: 0.75rem;
      color: hsl(var(--foreground));
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .google-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, hsla(280, 100%, 70%, 0.1), hsla(200, 100%, 60%, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .google-btn:hover {
      background: hsla(0, 0%, 100%, 0.08);
      border-color: hsla(0, 0%, 100%, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px hsla(280, 100%, 70%, 0.3);
    }

    .google-btn:hover::before {
      opacity: 1;
    }

    .google-btn:active {
      transform: translateY(0);
    }

    .google-btn svg {
      width: 1.25rem;
      height: 1.25rem;
      position: relative;
      z-index: 1;
    }

    .google-btn span {
      position: relative;
      z-index: 1;
    }

    /* Phone Login Styles */
    .phone-input-group {
      margin-bottom: 1rem;
    }

    .input-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
      margin-bottom: 0.5rem;
    }

    .phone-number-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: hsla(var(--input-bg), 0.5);
      border: 1px solid hsla(var(--border-color), 0.5);
      border-radius: 0.75rem;
      padding: 0 1rem;
      transition: all 0.25s ease;
    }

    .phone-number-wrapper:focus-within {
      border-color: hsla(var(--accent), 0.5);
      box-shadow: 0 0 0 3px hsla(var(--accent), 0.1);
      background: hsla(var(--input-bg), 0.8);
    }

    .country-code {
      font-size: 0.9375rem;
      color: hsl(var(--foreground));
      font-weight: 600;
      padding: 0.9375rem 0;
      border-right: 1px solid hsla(var(--border-color), 0.5);
      padding-right: 0.75rem;
    }

    .phone-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9375rem 0;
      color: hsl(var(--foreground));
      font-size: 0.9375rem;
      font-family: inherit;
      outline: none;
    }

    .phone-input::placeholder {
      color: hsla(var(--muted-foreground), 0.6);
    }

    /* Primary Button */
    .send-otp-btn,
    .verify-otp-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9375rem 1.5rem;
      background: linear-gradient(135deg, hsl(var(--accent)), hsl(var(--accent-secondary)));
      border: none;
      border-radius: 0.75rem;
      color: hsl(var(--background));
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .send-otp-btn:hover:not(:disabled),
    .verify-otp-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px hsla(var(--accent), 0.5);
    }

    .send-otp-btn:active:not(:disabled),
    .verify-otp-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .send-otp-btn:disabled,
    .verify-otp-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .send-otp-btn svg,
    .verify-otp-btn svg {
      width: 1.125rem;
      height: 1.125rem;
      stroke-width: 2.5;
    }

    /* OTP Section */
    .otp-section {
      animation: fadeIn 0.3s ease-out;
    }

    .otp-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .otp-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 0.375rem;
    }

    .otp-subtitle {
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.5;
    }

    .otp-phone {
      color: hsl(var(--foreground));
      font-weight: 600;
    }

    .otp-container {
      margin: 1.5rem 0;
    }

    .otp-boxes {
      display: flex;
      gap: 0.625rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .otp-box {
      width: 2.875rem;
      height: 3.25rem;
      background: hsla(var(--input-bg), 0.5);
      border: 1px solid white !important;
      border-radius: 0.625rem;
      text-align: center;
      font-size: 1.375rem;
      font-weight: 600;
      color: hsl(var(--foreground));
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: all 0.2s ease;
      caret-color: hsl(var(--accent));
    }

    .otp-box:focus {
      border-color: hsl(var(--accent));
      box-shadow: 0 0 0 3px hsla(var(--accent), 0.15);
      background: hsla(var(--input-bg), 0.8);
    }

    .otp-box.filled {
      border-color: hsla(var(--accent), 0.5);
      background: hsla(var(--accent), 0.05);
    }

    .otp-box:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @media (max-width: 400px) {
      .otp-boxes {
        gap: 0.5rem;
      }
      .otp-box {
        width: 2.5rem;
        height: 3rem;
        font-size: 1.125rem;
      }
    }

    /* Timer */
    .timer-container {
      text-align: center;
      margin-bottom: 1rem;
    }

    .timer-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: hsla(var(--accent), 0.1);
      border: 1px solid hsla(var(--accent), 0.2);
      border-radius: 2rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: hsl(var(--accent));
    }

    .timer-badge svg {
      width: 0.9375rem;
      height: 0.9375rem;
      stroke-width: 2;
    }

    .timer-badge.expired {
      background: hsla(var(--error), 0.1);
      border-color: hsla(var(--error), 0.2);
      color: hsl(var(--error));
    }

    /* Resend Section */
    .resend-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid hsla(var(--border-color), 0.3);
    }

    .resend-text {
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
    }

    .resend-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      border-radius: 0.5rem;
      color: hsl(var(--accent));
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .resend-btn:hover:not(:disabled) {
      background: hsla(var(--accent), 0.1);
    }

    .resend-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .resend-btn svg {
      width: 0.9375rem;
      height: 0.9375rem;
      stroke-width: 2;
    }

    /* Back Button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.625rem 1rem;
      background: transparent;
      border: 1px solid hsla(var(--border-color), 0.5);
      border-radius: 0.5rem;
      color: hsl(var(--muted-foreground));
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.75rem;
    }

    .back-btn:hover {
      background: hsla(0, 0%, 100%, 0.05);
      color: hsl(var(--foreground));
      border-color: hsla(var(--border-color), 0.8);
    }

    .back-btn svg {
      width: 1rem;
      height: 1rem;
      stroke-width: 2;
    }

    /* Action Row */
    .action-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .action-row .back-btn {
      margin-top: 0;
      flex-shrink: 0;
    }

    .action-row .verify-otp-btn {
      flex: 1;
      margin-top: 0;
    }

    /* Messages */
    .error-message,
    .success-message {
      display: none;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.8125rem;
      margin-top: 1rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-message.show,
    .success-message.show {
      display: flex;
    }

    .error-message {
      background: hsla(var(--error), 0.1);
      border: 1px solid hsla(var(--error), 0.2);
      color: hsl(var(--error));
    }

    .success-message {
      background: hsla(var(--success), 0.1);
      border: 1px solid hsla(var(--success), 0.2);
      color: hsl(var(--success));
    }

    .error-message svg,
    .success-message svg {
      width: 1.125rem;
      height: 1.125rem;
      flex-shrink: 0;
      stroke-width: 2;
    }

    .message-content {
      flex: 1;
      line-height: 1.4;
    }

    /* Terms */
    .terms {
      text-align: center;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      margin-top: 1.75rem;
      line-height: 1.6;
    }

    .terms a {
      color: hsl(var(--foreground));
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .terms a:hover {
      color: hsl(var(--accent));
    }

    /* Loading Spinner */
    .spinner {
      width: 1.125rem;
      height: 1.125rem;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .google-btn.loading .spinner,
    .send-otp-btn.loading .spinner,
    .verify-otp-btn.loading .spinner {
      border-top-color: currentColor;
    }

    .send-otp-btn.loading .spinner,
    .verify-otp-btn.loading .spinner {
      border-top-color: hsl(var(--background));
    }

    .google-btn.loading,
    .send-otp-btn.loading,
    .verify-otp-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-pattern"></div>
    <div class="bottom-fade"></div>
  </div>

  <div class="page">
    <div class="container">
      <div class="glass-card">
        <div class="header">
          <div class="icon-container">
            <i data-lucide="fingerprint"></i>
          </div>
          <h1 class="title">Welcome Back</h1>
          <p class="subtitle">Sign in to continue to your account</p>
        </div>

        <!-- Login Method Toggle -->
        <div class="login-methods">
          <button class="method-btn active" id="googleMethodBtn">
            <i data-lucide="mail"></i>
            <span>Google</span>
          </button>
          <button class="method-btn" id="phoneMethodBtn">
            <i data-lucide="smartphone"></i>
            <span>Phone</span>
          </button>
        </div>

        <!-- Google Login Container -->
        <div id="googleLoginContainer">
          <div class="google-btn-wrapper">
            <button class="google-btn" id="googleBtn">
              <svg viewBox="0 0 24 24">
                <path fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"

    // Check if phone number is authorized in any property
    async function isPhoneAuthorized(phoneNumber) {
      try {
        console.log('Checking authorization for phone:', phoneNumber);
        const propertiesRef = db.collection('properties');
        const snapshot = await propertiesRef.get();
        
        const now = new Date();
        
        // Normalize phone number to +91XXXXXXXXXX format
        const normalizePhone = (phone) => {
          if (!phone) return '';
          // Remove all non-digit characters
          let cleaned = phone.toString().replace(/\D/g, '');
          // Ensure it starts with 91
          if (cleaned.startsWith('91')) {
            cleaned = '+' + cleaned;
          } else if (cleaned.length === 10) {
            cleaned = '+91' + cleaned;
          } else if (cleaned.length === 12 && cleaned.startsWith('91')) {
            cleaned = '+' + cleaned;
          }
          return cleaned;
        };
        
        const inputPhone = normalizePhone(phoneNumber);
        console.log('Normalized input phone:', inputPhone);
        
        for (const doc of snapshot.docs) {
          const data = doc.data();
          
          // Collect all phone numbers from property
          const phones = [
            data.phone1,
            data.phone2,
            data.phone3
          ].filter(phone => phone && phone.trim() !== '');
          
          console.log('Property phones:', phones);
          
          // Check if any phone matches
          const match = phones.some(phone => {
            const normalizedPhone = normalizePhone(phone);
            return normalizedPhone === inputPhone;
          });
          
          if (match) {
            // Check expiry
            const expiryDateTime = new Date(data.expiryDate + ' ' + data.expiryTime);
            if (expiryDateTime > now) {
              console.log('Phone authorized for property:', data.propertyName);
              return {
                authorized: true,
                propertyId: doc.id,
                propertyData: data
              };
            } else {
              console.log('Access expired for property:', data.propertyName);
              return {
                authorized: false,
                reason: 'expired'
              };
            }
          }
        }
        
        console.log('Phone not authorized');
        return {
          authorized: false,
          reason: 'not_authorized'
        };
      } catch (error) {
        console.error('Error checking phone authorization:', error);
        return {
          authorized: false,
          reason: 'error',
          error: error.message
        };
      }
    }

        // Enable resend after 30 seconds

const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
const sessionExpiry = new Date(Date.now() + 24 * 60 * 60 * 1000); // 24 hours

const clientIP = await getClientIP();

await db.collection('userSessions').doc(sessionId).set({
    sessionId: sessionId,
    phoneNumber: phoneNumber,
    propertyId: propertyId,
    propertyData: freshPropertyData,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt: sessionExpiry,
    userAgent: navigator.userAgent,
    ipAddress: clientIP
});

// Store in localStorage
localStorage.clear();
localStorage.setItem('sessionId', sessionId);
localStorage.setItem('currentPropertyId', propertyId);
localStorage.setItem('currentPropertyData', JSON.stringify(freshPropertyData));
localStorage.setItem('authMethod', 'phone');
localStorage.setItem('currentPhoneNumber', phoneNumber); // Store phone number
localStorage.setItem('sessionExpiry', sessionExpiry.toISOString());

showSuccess('Login successful! Redirecting...');
setTimeout(() => {
    window.location.href = 'dashboard.html';
}, 1500);
        
      } catch (error) {
        console.error('Error verifying OTP:', error);
        showError('Error verifying OTP. Please try again.');
      } finally {
        if (verifyBtn) {
          verifyBtn.classList.remove('loading');
          verifyBtn.innerHTML = '<span>Verify OTP</span><i data-lucide="check"></i>';
          verifyBtn.disabled = false;
        }
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    }
    
    // Back to phone number input
    function backToPhoneNumber() {
      stopTimer();
      hideMessages();
      resetPhoneLoginState();
    }
    
    // Google Login
    async function handleGoogleLogin() {
      const btn = document.getElementById('googleBtn');
      if (btn) {
        btn.classList.add('loading');
        btn.innerHTML = '<div class="spinner"></div><span>Signing in...</span>';
      }
      
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await firebase.auth().signInWithPopup(provider);
        
        const userEmail = result.user.email;
        
        if (ADMIN_EMAILS.includes(userEmail)) {
          window.location.href = 'admin.html';
          return;
        }
        
        const accessResult = await checkUserAccess(userEmail);
        
        if (accessResult.hasAccess) {
          localStorage.setItem('currentPropertyId', accessResult.propertyId);
          localStorage.setItem('currentPropertyData', JSON.stringify(accessResult.propertyData));
          localStorage.removeItem('currentPhoneNumber');
          localStorage.setItem('authMethod', 'email');
          window.location.href = 'dashboard.html';
        } else {
          let message = 'You do not have access to any properties.';
          if (accessResult.reason === 'expired') {
            message = 'Your access has expired. Please contact the administrator.';
          } else if (accessResult.reason === 'not_authorized') {
            message = 'Your email is not authorized by the administrator.';
          }
          
          showError(message);
          await firebase.auth().signOut();
          if (btn) {
            btn.classList.remove('loading');
            btn.innerHTML = `
              <svg viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span>Continue with Google</span>
            `;
          }
        }
      } catch (error) {
        console.error('Login error:', error);
        let errorMessage = 'Login failed. ';
        
        if (error.code === 'auth/popup-blocked') {
          errorMessage += 'Popup was blocked by browser. Please allow popups for this site.';
        } else if (error.code === 'auth/popup-closed-by-user') {
          errorMessage += 'Login popup was closed. Please try again.';
        } else {
          errorMessage += error.message;
        }
        
        showError(errorMessage);
        if (btn) {
          btn.classList.remove('loading');
          btn.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Continue with Google</span>
          `;
        }
      }
    }
    
    async function checkUserAccess(userEmail) {
      try {
        const propertiesRef = db.collection('properties');
        const snapshot = await propertiesRef.get();
        const now = new Date();
        
        for (const doc of snapshot.docs) {
          const data = doc.data();
          const emails = [data.email1, data.email2, data.email3].filter(email => email && email.trim() !== '');
          
          if (emails.includes(userEmail)) {
            const expiryDateTime = new Date(data.expiryDate + ' ' + data.expiryTime);
            if (expiryDateTime > now) {
              return {
                hasAccess: true,
                propertyId: doc.id,
                propertyData: data
              };
            } else {
              return {
                hasAccess: false,
                reason: 'expired'
              };
            }
          }
        }
        
        return {
          hasAccess: false,
          reason: 'not_authorized'
        };
      } catch (error) {
        console.error('Error checking access:', error);
        return {
          hasAccess: false,
          reason: 'error'
        };
      }
    }
    
    // Check if user is already logged in
    if (typeof firebase !== 'undefined') {
      firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
          if (ADMIN_EMAILS.includes(user.email)) {
            window.location.href = 'admin.html';
            return;
          }
          
          try {
            const accessResult = await checkUserAccess(user.email);
            
            if (accessResult.hasAccess) {
              localStorage.setItem('currentPropertyId', accessResult.propertyId);
              localStorage.setItem('currentPropertyData', JSON.stringify(accessResult.propertyData));
              localStorage.removeItem('currentPhoneNumber');
              localStorage.setItem('authMethod', 'email');
              window.location.href = 'dashboard.html';
            } else {
              await firebase.auth().signOut();
              localStorage.clear();
            }
          } catch (error) {
            console.error('Auto-login check error:', error);
            await firebase.auth().signOut();
            localStorage.clear();
          }
        } else {
          // Check for phone session
          const sessionId = localStorage.getItem('sessionId');
          const sessionExpiry = localStorage.getItem('sessionExpiry');
          const propertyId = localStorage.getItem('currentPropertyId');
          
          if (sessionId && sessionExpiry && propertyId && new Date(sessionExpiry) > new Date()) {
            // Valid phone session exists
            window.location.href = 'dashboard.html';
          } else {
            localStorage.clear();
          }
        }
      });
    }
  </script>
