<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- In login.html head section, update to: -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Keep all your existing login.html styles exactly as they are */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --muted-foreground: 240 5% 64.9%;
      --glow-primary: 280 100% 70%;
      --glow-secondary: 200 100% 60%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at center,
          hsla(280, 100%, 70%, 0.15) 0%,
          hsla(200, 100%, 60%, 0.08) 40%,
          transparent 70%);
      filter: blur(60px);
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      top: 25%;
      left: 25%;
      transform: translate(-50%, -50%);
      animation: float1 20s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      bottom: 25%;
      right: 25%;
      transform: translate(50%, 50%);
      animation: float2 15s ease-in-out infinite;
      animation-delay: 2s;
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translate(-50%, -50%) translate(0, 0);
      }

      50% {
        transform: translate(-50%, -50%) translate(50px, -30px);
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(50%, 50%) translate(0, 0);
      }

      50% {
        transform: translate(50%, 50%) translate(-40px, 40px);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }
    }

    .orb-1,
    .orb-2 {
      animation-name: float1, pulse-glow;
      animation-duration: 20s, 4s;
      animation-timing-function: ease-in-out, ease-in-out;
      animation-iteration-count: infinite, infinite;
    }

    .orb-2 {
      animation-name: float2, pulse-glow;
      animation-duration: 15s, 4s;
    }

    .grid-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.02;
      background-image:
        linear-gradient(hsl(var(--foreground)) 1px, transparent 1px),
        linear-gradient(90deg, hsl(var(--foreground)) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 28rem;
      margin: 0 auto;
      animation: fadeInUp 0.6s ease-out;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: hsla(240, 10%, 10%, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid hsla(0, 0%, 100%, 0.08);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 80px -20px hsla(280, 100%, 70%, 0.15);
    }

    @media (min-width: 480px) {
      .glass-card {
        padding: 2rem;
      }
    }

    @media (min-width: 768px) {
      .glass-card {
        padding: 2.5rem;
      }
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.5s ease-out 0.2s both;
    }

    .icon-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, hsla(280, 100%, 70%, 0.2), hsla(200, 100%, 60%, 0.2));
      border: 1px solid hsla(280, 100%, 70%, 0.2);
      margin-bottom: 1.5rem;
    }

    .icon-container svg {
      width: 1.75rem;
      height: 1.75rem;
      color: hsl(var(--foreground));
    }

    .title {
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, hsl(var(--foreground)) 0%, hsl(var(--muted-foreground)) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    @media (min-width: 768px) {
      .title {
        font-size: 1.875rem;
      }
    }

    .subtitle {
      color: hsl(var(--muted-foreground));
      font-size: 0.875rem;
    }

    @media (min-width: 768px) {
      .subtitle {
        font-size: 1rem;
      }
    }

    .google-btn-wrapper {
      animation: fadeInUp 0.5s ease-out 0.4s both;
    }

    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: hsla(0, 0%, 100%, 0.05);
      border: 1px solid hsla(0, 0%, 100%, 0.1);
      border-radius: 0.75rem;
      color: hsl(var(--foreground));
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .google-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, hsla(280, 100%, 70%, 0.1), hsla(200, 100%, 60%, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .google-btn:hover {
      background: hsla(0, 0%, 100%, 0.08);
      border-color: hsla(0, 0%, 100%, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px hsla(280, 100%, 70%, 0.3);
    }

    .google-btn:hover::before {
      opacity: 1;
    }

    .google-btn:active {
      transform: translateY(0);
    }

    .google-btn svg {
      width: 1.125rem;
      height: 1.125rem;
      position: relative;
      z-index: 1;
    }

    .google-btn span {
      position: relative;
      z-index: 1;
    }

    .terms {
      text-align: center;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      margin-top: 2rem;
      animation: fadeIn 0.5s ease-out 0.6s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .terms a {
      color: hsl(var(--foreground));
      text-decoration: none;
      text-underline-offset: 2px;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .bottom-link {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.875rem;
      color: hsl(var(--muted-foreground));
      animation: fadeIn 0.5s ease-out 0.8s both;
    }

    .bottom-link a {
      color: hsl(var(--foreground));
      font-weight: 500;
      text-decoration: none;
      text-underline-offset: 2px;
    }

    .bottom-link a:hover {
      text-decoration: underline;
    }

    .bottom-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8rem;
      background: linear-gradient(to top, hsl(var(--background)), transparent);
      pointer-events: none;
    }

    .google-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .spinner {
      width: 1.125rem;
      height: 1.125rem;
      border: 2px solid hsla(0, 0%, 100%, 0.3);
      border-top-color: hsl(var(--foreground));
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error message styling */
    .error-message {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 14px;
      color: #ff6b6b;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>

<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-pattern"></div>
    <div class="bottom-fade"></div>
  </div>

  <div class="page">
    <div class="container">
      <div class="glass-card">
        <div class="header">
          <div class="icon-container">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
            </svg>
          </div>
          <h1 class="title">Welcome</h1>
          <p class="subtitle">Sign in to continue to your account</p>
        </div>

        <div class="google-btn-wrapper">
          <button class="google-btn" id="googleBtn" onclick="handleGoogleLogin()">
            <svg viewBox="0 0 24 24">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span>Continue with Google</span>
          </button>

          <!-- Error message container -->
          <div class="error-message" id="errorMessage"></div>
        </div>

        <p class="terms">
          By continuing, you agree to our
          <a href="#">Terms of Service</a>
          and
          <a href="#">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Add Firebase Config -->
  <script src="firebase-config.js"></script>

  <script>
// Admin emails (hardcoded)
const ADMIN_EMAILS = ['mohancheenu04@gmail.com', 'drasisdata@gmail.com'];

// Show error message
function showError(message) {
  const errorDiv = document.getElementById('errorMessage');
  errorDiv.textContent = message;
  errorDiv.classList.add('show');

  // Auto-hide after 5 seconds
  setTimeout(() => {
    errorDiv.classList.remove('show');
  }, 5000);
}

// Hide error message
function hideError() {
  document.getElementById('errorMessage').classList.remove('show');
}

async function handleGoogleLogin() {
  const btn = document.getElementById('googleBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner"></div><span>Signing in...</span>';
  hideError();

  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await firebase.auth().signInWithPopup(provider);

    console.log('Login successful for:', result.user.email);

    // Check if user is admin
    const userEmail = result.user.email;

    if (ADMIN_EMAILS.includes(userEmail)) {
      // Redirect admin to admin.html
      console.log('Admin detected, redirecting to admin panel');
      window.location.href = 'admin.html';
      return;
    }

    // Check if user has access to any property
    console.log('Checking access for user:', userEmail);
    const accessResult = await checkUserAccess(userEmail);
    console.log('Access result:', accessResult);

    if (accessResult.hasAccess) {
      console.log('Access granted, storing data and redirecting');
      // Store property data in localStorage
      localStorage.setItem('currentPropertyId', accessResult.propertyId);
      localStorage.setItem('currentPropertyData', JSON.stringify(accessResult.propertyData));

      // Redirect to index page for verification
      window.location.href = 'dashboard.html';
    } else {
      let message = 'You do not have access to any properties.';
      if (accessResult.reason === 'expired') {
        message = 'Your access has expired. Please contact the administrator.';
      } else if (accessResult.reason === 'not_authorized') {
        message = 'Your email is not authorized by the administrator.';
      } else if (accessResult.reason === 'firebase_error') {
        message = 'Database access error. Please try again or contact administrator.';
      }

      console.log('Access denied:', message);
      showError(message);
      await firebase.auth().signOut();
      btn.classList.remove('loading');
      btn.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Continue with Google</span>
        `;
    }
  } catch (error) {
    console.error('Login error:', error);
    let errorMessage = 'Login failed. ';

    if (error.code === 'auth/popup-blocked') {
      errorMessage += 'Popup was blocked by browser. Please allow popups for this site.';
    } else if (error.code === 'auth/popup-closed-by-user') {
      errorMessage += 'Login popup was closed. Please try again.';
    } else {
      errorMessage += error.message;
    }

    showError(errorMessage);
    btn.classList.remove('loading');
    btn.innerHTML = `
        <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Continue with Google</span>
    `;
  }
}

async function checkUserAccess(userEmail) {
  try {
    console.log('Fetching properties from Firestore...');
    const propertiesRef = db.collection('properties');
    const snapshot = await propertiesRef.get();

    console.log('Total properties found:', snapshot.size);

    const now = new Date();

    for (const doc of snapshot.docs) {
      const data = doc.data();
      console.log('Checking property:', data.propertyName, 'Emails:', [
        data.email1, data.email2, data.email3
      ]);

      // Check if email is in any of the email fields
      const emails = [data.email1, data.email2, data.email3]
        .filter(email => email && email.trim() !== '');

      console.log('Valid emails for this property:', emails);
      console.log('User email:', userEmail);
      console.log('Email match:', emails.includes(userEmail));

      if (emails.includes(userEmail)) {
        // Check expiration
        console.log('Expiry date:', data.expiryDate);
        console.log('Expiry time:', data.expiryTime);

        const expiryDateTime = new Date(data.expiryDate + ' ' + data.expiryTime);
        console.log('Expiry datetime:', expiryDateTime);
        console.log('Current datetime:', now);
        console.log('Is expired?', expiryDateTime <= now);

        if (expiryDateTime > now) {
          console.log('Access GRANTED for property:', data.propertyName);
          return {
            hasAccess: true,
            propertyId: doc.id,
            propertyData: data
          };
        } else {
          console.log('Access EXPIRED for property:', data.propertyName);
          return {
            hasAccess: false,
            reason: 'expired',
            propertyId: doc.id
          };
        }
      }
    }

    console.log('No matching properties found for email:', userEmail);
    return {
      hasAccess: false,
      reason: 'not_authorized'
    };
  } catch (error) {
    console.error('Error checking access:', error);

    // Check if it's a permission error
    if (error.code === 'permission-denied' || error.message.includes('insufficient permissions')) {
      console.error('Firestore permission denied. Check your security rules.');
      return {
        hasAccess: false,
        reason: 'firebase_error',
        error: error.message
      };
    }

    return {
      hasAccess: false,
      reason: 'error',
      error: error.message
    };
  }
}

// Check if user is already logged in
firebase.auth().onAuthStateChanged(async (user) => {
  if (user) {
    console.log('User already signed in:', user.email);
    
    // Check if admin first
    if (ADMIN_EMAILS.includes(user.email)) {
      console.log('Admin detected on login page');
      
      // Check which admin page to redirect to
      // Check URL parameters first (for explicit navigation)
      const urlParams = new URLSearchParams(window.location.search);
      const redirectTo = urlParams.get('redirect');
      
      if (redirectTo === 'admin-control') {
        console.log('Redirecting to admin-control based on URL parameter');
        window.location.href = 'admin-control.html';
        return;
      }
      
      // Check localStorage for last visited admin page
      const lastAdminPage = localStorage.getItem('lastAdminPage');
      if (lastAdminPage === 'admin-control') {
        console.log('Redirecting to admin-control based on localStorage');
        window.location.href = 'admin-control.html';
        return;
      }
      
      // Check referrer as fallback
      const referrer = document.referrer;
      console.log('Referrer:', referrer);
      if (referrer.includes('admin-control.html')) {
        console.log('Redirecting to admin-control based on referrer');
        localStorage.setItem('lastAdminPage', 'admin-control');
        window.location.href = 'admin-control.html';
        return;
      }
      
      // Default to admin.html
      console.log('Redirecting to admin.html (default)');
      localStorage.setItem('lastAdminPage', 'admin');
      window.location.href = 'admin.html';
      return;
    }
    
    // Regular user check
    console.log('Regular user detected, checking access');
    try {
      const accessResult = await checkUserAccess(user.email);
      console.log('Auto-login access result:', accessResult);
      
      if (accessResult.hasAccess) {
        localStorage.setItem('currentPropertyId', accessResult.propertyId);
        localStorage.setItem('currentPropertyData', JSON.stringify(accessResult.propertyData));
        window.location.href = 'dashboard.html';
      } else {
        // Not authorized or expired, show message
        let message = 'Your session has expired or you are not authorized.';
        if (accessResult.reason === 'expired') {
          message = 'Your access has expired. Please contact the administrator.';
        } else if (accessResult.reason === 'not_authorized') {
          message = 'Your email is not authorized. Please contact the administrator.';
        }
        
        showError(message);
        // Sign out the user
        await firebase.auth().signOut();
        localStorage.removeItem('currentPropertyId');
        localStorage.removeItem('currentPropertyData');
        localStorage.removeItem('lastAdminPage');
      }
    } catch (error) {
      console.error('Auto-login check error:', error);
      showError('Error checking your access. Please try again.');
      // Sign out on error
      await firebase.auth().signOut();
      localStorage.clear();
    }
  } else {
    console.log('No user signed in');
    // Clear any stale localStorage data
    localStorage.removeItem('lastAdminPage');
  }
});

// Helper function to set redirect preference (call this from admin-control.html)
function setAdminRedirectPreference(page) {
  if (ADMIN_EMAILS.includes(firebase.auth().currentUser?.email)) {
    localStorage.setItem('lastAdminPage', page);
    console.log('Set admin redirect preference to:', page);
  }
}

// Optional: Add this to admin-control.html to track when user is on control panel
if (typeof setAdminRedirectPreference === 'function' && 
    ADMIN_EMAILS.includes(firebase.auth().currentUser?.email)) {
  setAdminRedirectPreference('admin-control');
}
  </script>
  
</body>

</html>
