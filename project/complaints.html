<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Complaints System</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #1D1B1E;
            --accent: #F26F1E;
            --card-radius: 16px;
            --shadow: 0 6px 20px rgba(0,0,0,0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* View container */
        .view-container {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
            display: none;
        }

        .view-container.active {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px;
            background: black;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        .title {
            font-size: 35px;
            font-weight: 300;
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        /* SEARCH */
        .search-container {
            margin: 18px 0;
            display: flex;
            justify-content: center;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        /* CATEGORY CHIPS */
        .chip-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .chip {
            padding: 10px 18px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            transition: background 0.3s;
        }

        .chip.active {
            background: var(--accent);
        }

        /* COMPLAINT CARDS */
        .complaint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .complaint-card {
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 14px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .complaint-card:hover {
            transform: translateY(-5px);
            background: var(--accent);
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .complaint-card:hover .card-icon {
            color: white;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: black;
        }

        .card-desc {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 6px;
            color: black;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #2A2A2A;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
        }

        .modal-title {
            font-size: 22px;
            margin-bottom: 14px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            outline: none;
            resize: none;
            font-family: "Inter", sans-serif;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .cancel-btn, .submit-btn {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: "Inter", sans-serif;
            transition: opacity 0.3s;
        }

        .cancel-btn {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .submit-btn {
            background: var(--accent);
            color: white;
        }

        .cancel-btn:hover, .submit-btn:hover {
            opacity: 0.9;
        }

        /* SUCCESS PAGE STYLES */
        .success-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 28px;
            margin-top: 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .success-button {
            margin-top: 20px;
            background: var(--accent);
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            border: none;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .success-button:hover {
            opacity: 0.9;
        }

        .success-header {
            background: black;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
        }

        .success-title {
            font-size: 24px;
            font-weight: 300;
        }

        .success-room {
            font-size: 14px;
            font-weight: 300;
            margin-top: 5px;
        }

        /* Icon styling */
        .mdi {
            display: inline-block;
            font-family: "Material Design Icons";
            font-size: inherit;
            text-rendering: auto;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .complaint-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
            
            .title {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .complaint-grid {
                grid-template-columns: 1fr;
            }
            
            .title {
                font-size: 24px;
            }
            
            .modal-content {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Complaints Page View -->
    <div id="complaintsView" class="view-container active">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="title">COMPLAINTS</div>
                <div class="subtitle">Room <span id="roomNo">G01</span> • Report a Problem</div>
            </div>

            <!-- Search -->
            <div class="search-container">
                <input type="text" class="search-bar" id="searchBar" placeholder="Search complaints...">
            </div>

            <!-- Category Chips -->
            <div class="chip-row" id="chipRow">
                <div class="chip active" data-category="all">All</div>
                <div class="chip" data-category="plumbing">Plumbing</div>
                <div class="chip" data-category="electrical">Electrical</div>
                <div class="chip" data-category="ac">AC / Cooling</div>
                <div class="chip" data-category="bathroom">Bathroom</div>
                <div class="chip" data-category="wifi">TV / WiFi</div>
                <div class="chip" data-category="furniture">Furniture</div>
                <div class="chip" data-category="other">Others</div>
            </div>

            <!-- Complaint Cards -->
            <div class="complaint-grid" id="complaintGrid">
                <!-- Cards will be dynamically generated -->
            </div>
        </div>
    </div>

    <!-- Success Page View -->
    <div id="successView" class="view-container">
        <div class="container">
            <div class="success-header">
                <div class="success-title">COMPLAINT SUBMITTED</div>
                <div class="success-room">Room <span id="successRoomNo">G01</span></div>
            </div>

            <div class="success-card">
                <div class="success-icon">✓</div>
                <h2>Your complaint has been received!</h2>
                <p><b><span id="complaintName">No Water Flow</span></b></p>
                <p id="complaintNote"></p>

                <button class="success-button" onclick="showComplaintsPage()">Back to Complaints</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <textarea id="note" placeholder="Describe your problem (optional)..."></textarea>

            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="submit-btn" onclick="submitComplaint()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        // Application state
        const appState = {
            roomNumber: "G01",
            currentView: "complaints",
            selectedComplaint: null,
            complaints: [
                { title: "Water Leakage", desc: "Leaking taps, pipes, bathroom lines.", icon: "mdi-water", category: "plumbing" },
                { title: "No Water Flow", desc: "Low pressure or no water supply.", icon: "mdi-water-off", category: "plumbing" },
                { title: "Toilet Flush Issue", desc: "Flush not working properly.", icon: "mdi-toilet", category: "plumbing" },
                { title: "Light Not Working", desc: "Bulbs, switches not functioning.", icon: "mdi-lightbulb-alert-outline", category: "electrical" },
                { title: "Power Socket Issue", desc: "Charging point not working.", icon: "mdi-power-socket-eu", category: "electrical" },
                { title: "AC Not Cooling", desc: "Cooling issue or noise.", icon: "mdi-air-conditioner", category: "ac" },
                { title: "AC Remote Issue", desc: "Remote not responding.", icon: "mdi-remote", category: "ac" },
                { title: "Shower Issue", desc: "Low pressure / broken shower.", icon: "mdi-shower", category: "bathroom" },
                { title: "Drain Blockage", desc: "Bathroom water not draining.", icon: "mdi-water-sync", category: "bathroom" },
                { title: "WiFi Not Working", desc: "Internet connectivity issue.", icon: "mdi-wifi-alert", category: "wifi" },
                { title: "TV Not Working", desc: "Black screen / no sound.", icon: "mdi-television-off", category: "wifi" },
                { title: "Broken Chair", desc: "Furniture issue.", icon: "mdi-chair-rolling", category: "furniture" },
                { title: "Loose Table", desc: "Shaking or unstable table.", icon: "mdi-desk", category: "furniture" },
                { title: "Other Complaint", desc: "Any problem not listed here.", icon: "mdi-alert-circle-outline", category: "other" }
            ]
        };

        // DOM Elements
        const complaintsView = document.getElementById('complaintsView');
        const successView = document.getElementById('successView');
        const complaintGrid = document.getElementById('complaintGrid');
        const searchBar = document.getElementById('searchBar');
        const chipRow = document.getElementById('chipRow');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const noteTextarea = document.getElementById('note');
        const roomNoElement = document.getElementById('roomNo');
        const successRoomNo = document.getElementById('successRoomNo');
        const complaintNameElement = document.getElementById('complaintName');
        const complaintNoteElement = document.getElementById('complaintNote');

        // Initialize the app
        function initApp() {
            roomNoElement.textContent = appState.roomNumber;
            successRoomNo.textContent = appState.roomNumber;
            renderComplaints();
            setupEventListeners();
        }

        // Render complaints based on filter and search
        function renderComplaints(filter = "all", search = "") {
            complaintGrid.innerHTML = "";

            const filtered = appState.complaints.filter(c =>
                (filter === "all" || c.category === filter) &&
                (c.title.toLowerCase().includes(search) || c.desc.toLowerCase().includes(search))
            );

            filtered.forEach(c => {
                const card = document.createElement("div");
                card.className = "complaint-card";
                card.innerHTML = `
                    <div class="card-icon">
                        <i class="mdi ${c.icon}"></i>
                    </div>
                    <div class="card-title">${c.title}</div>
                    <div class="card-desc">${c.desc}</div>
                `;
                card.onclick = () => openModal(c.title);
                complaintGrid.appendChild(card);
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            // Category filter
            chipRow.addEventListener("click", e => {
                if (e.target.classList.contains("chip")) {
                    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
                    e.target.classList.add("active");
                    renderComplaints(e.target.dataset.category, searchBar.value.toLowerCase());
                }
            });

            // Search
            searchBar.addEventListener("input", () => {
                const active = document.querySelector(".chip.active").dataset.category;
                renderComplaints(active, searchBar.value.toLowerCase());
            });
        }

        // Modal functions
        function openModal(complaintTitle) {
            appState.selectedComplaint = complaintTitle;
            modalTitle.textContent = complaintTitle;
            noteTextarea.value = "";
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            appState.selectedComplaint = null;
        }

        // Submit complaint
        function submitComplaint() {
            const description = noteTextarea.value;

            // Store in localStorage (simulating the original behavior)
            localStorage.setItem("complaintName", appState.selectedComplaint);
            localStorage.setItem("complaintNote", description);
            localStorage.setItem("roomNumber", appState.roomNumber);

            // Update success page
            complaintNameElement.textContent = appState.selectedComplaint;
            complaintNoteElement.textContent = description && description.trim() !== ""
                ? "Note: " + description
                : "No additional description was provided.";

            // Switch to success view
            showSuccessPage();
            closeModal();
        }

        // View navigation
        function showComplaintsPage() {
            complaintsView.classList.add('active');
            successView.classList.remove('active');
            appState.currentView = "complaints";
        }

        function showSuccessPage() {
            complaintsView.classList.remove('active');
            successView.classList.add('active');
            appState.currentView = "success";
        }

        // Initialize the app when page loads
        document.addEventListener('DOMContentLoaded', initApp);

        // Handle browser back/forward buttons
        window.addEventListener('popstate', function(event) {
            if (appState.currentView === "success") {
                showComplaintsPage();
            }
        });
    </script>
</body>
</html>
