<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Service Requests</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&amp;family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
    <!-- Material Icons CDN -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1D1B1E;
            --accent: #F26F1E;
            --card-radius: 16px;
            --gap: 18px;
            --shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
            --glass: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .title {
            font-size: 32px;
            font-weight: 300;
            color: white;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
        }

        /* SEARCH BAR */
        .search-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* CATEGORY CHIPS */
        .chip-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .chip {
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            white-space: nowrap;
            cursor: pointer;
            transition: .3s;
            font-weight: 600;
        }

        .chip.active {
            background: var(--accent);
            color: #fff;
        }

        /* SERVICE CARDS */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            display: flex;
            flex-direction: column;
            padding: 16px;
            border-radius: var(--card-radius);
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.06);
            overflow: hidden;
            gap: 12px;
            height: 100%;
        }

        .service-icon {
            font-size: 36px;
            color: #000;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .service-icon i {
            font-size: 36px;
        }

        .service-title {
            font-weight: 700;
            font-size: 18px;
            color: #000;
        }

        .service-desc {
            font-size: 14px;
            color: #333;
        }

        .request-btn {
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 600;
            background: #fff;
            color: #000;
            border: 1px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
            width: 100%;
            transition: 0.2s ease;
            text-align: center;
            margin-top: auto;
        }

        .request-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .services-grid {
                grid-template-columns: 1fr;
            }
        }

        /* SUCCESS OVERLAY */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 1);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            max-width: 800px;
            width: 100%;
            margin: auto;
            padding: 20px;
        }

        .success-header {
            text-align: center;
            padding: 20px;
            background: black;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 34px;
            font-weight: 300;
        }

        .success-subtitle {
            opacity: .9;
            font-size: 18px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 5px;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .success-button {
            margin-top: 20px;
            background: var(--accent);
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        .success-button:hover {
            background: #e05e1a;
        }
    </style>

</head>

<body>
    <!-- Main Service Page -->
    <div class="container">
        <header class="header">
            <h1 class="title">SERVICE REQUEST</h1>
            <div class="subtitle">Room <span id="roomNumber">G01</span> • Guest Support</div>
        </header>

        <div class="search-container">
            <input type="text" class="search-bar" id="searchBar" placeholder="Search services...">
        </div>

        <div class="chip-row" id="chipRow">
            <div class="chip active" data-category="all">All</div>
            <div class="chip" data-category="housekeeping">Housekeeping</div>
            <div class="chip" data-category="essentials">Essentials</div>
            <div class="chip" data-category="maintenance">Maintenance</div>
            <div class="chip" data-category="dining">Dining</div>
            <div class="chip" data-category="guest">Guest Services</div>
        </div>

        <main class="services-grid" id="servicesGrid">
            <!-- Services will be rendered here -->
        </main>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-container">
            <div class="success-header">
                <div class="success-title">REQUEST SENT</div>
                <div class="success-subtitle">Room <span id="successRoomNumber">G01</span></div>
            </div>

            <div class="success-card">
                <div class="success-icon">✓</div>
                <h2>Your request has been submitted!</h2>
                <p><span id="successServiceName">Make My Room</span> will be delivered shortly.</p>
                <button class="success-button" onclick="closeSuccess()">Back to Services</button>
            </div>
        </div>
    </div>

    <script>
        /* ---------- ROOM NUMBER ---------- */
        const roomNumber = "G01";
        document.getElementById("roomNumber").textContent = roomNumber;

        /* ---------- SERVICE DATA WITH MATERIAL ICONS ---------- */
        const services = [
            { id: 1, title: "Room Cleaning", desc: "Complete housekeeping service.", icon: "cleaning_services", category: "housekeeping" },
            { id: 2, title: "Make My Room", desc: "Prepare room while you're away.", icon: "bed", category: "housekeeping" },
            { id: 3, title: "Extra Bedsheet", desc: "Request fresh bedsheet.", icon: "bed", category: "housekeeping" },
            { id: 4, title: "Extra Pillow", desc: "Additional pillow for comfort.", icon: "nightlight_round", category: "housekeeping" },
            { id: 5, title: "Towel Replacement", desc: "Fresh towels delivered.", icon: "bathtub", category: "housekeeping" },
            { id: 6, title: "Laundry Pickup", desc: "We will collect your laundry.", icon: "local_laundry_service", category: "housekeeping" },

            { id: 7, title: "Water Bottle", desc: "Get packaged drinking water.", icon: "water_drop", category: "essentials" },
            { id: 10, title: "Soap/Shampoo", desc: "Bathing essentials.", icon: "shower", category: "essentials" },
            { id: 11, title: "Tea/Coffee Refill", desc: "Refill beverage packets.", icon: "coffee", category: "essentials" },

            { id: 12, title: "AC Not Cooling", desc: "Technician will check AC.", icon: "ac_unit", category: "maintenance" },
            { id: 13, title: "Light Not Working", desc: "Electrician will fix issue.", icon: "lightbulb", category: "maintenance" },
            { id: 14, title: "TV Not Working", desc: "Technician will inspect TV.", icon: "tv", category: "maintenance" },

            { id: 15, title: "Cutlery", desc: "Spoon, fork, knives, etc.", icon: "restaurant", category: "dining" },
            { id: 16, title: "Plates", desc: "Serving plates delivery.", icon: "dinner_dining", category: "dining" },
            { id: 17, title: "Ice Cubes", desc: "Ice delivery to your room.", icon: "ac_unit", category: "dining" },

            { id: 18, title: "Wake-Up Call", desc: "We will wake you on time.", icon: "alarm", category: "guest" },
            { id: 19, title: "Luggage Assistance", desc: "Staff will assist you.", icon: "luggage", category: "guest" }
        ];

        const servicesGrid = document.getElementById("servicesGrid");
        const searchBar = document.getElementById("searchBar");
        const chipRow = document.getElementById("chipRow");
        const successOverlay = document.getElementById("successOverlay");
        const successRoomNumber = document.getElementById("successRoomNumber");
        const successServiceName = document.getElementById("successServiceName");

        /* ---------- RENDER FUNCTION ---------- */
        function renderServices(filter = "all", search = "") {
            servicesGrid.innerHTML = "";

            const filtered = services.filter(s =>
                (filter === "all" || s.category === filter) &&
                (s.title.toLowerCase().includes(search) || s.desc.toLowerCase().includes(search))
            );

            filtered.forEach(s => {
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <div class="service-icon">
                        <i class="material-icons">${s.icon}</i>
                    </div>
                    <div class="service-title">${s.title}</div>
                    <div class="service-desc">${s.desc}</div>
                    <button class="request-btn" onclick="sendRequest('${s.title}')">Request</button>
                `;

                servicesGrid.appendChild(card);
            });
        }

        /* ---------- REQUEST HANDLER ---------- */
        function sendRequest(serviceName) {
            localStorage.setItem("serviceRequest", serviceName);
            localStorage.setItem("roomNumber", roomNumber);
            
            // Show success overlay
            successRoomNumber.textContent = roomNumber;
            successServiceName.textContent = serviceName;
            successOverlay.style.display = "flex";
            
            // Optional: Disable scroll when overlay is shown
            document.body.style.overflow = "hidden";
        }

        /* ---------- CLOSE SUCCESS OVERLAY ---------- */
        function closeSuccess() {
            successOverlay.style.display = "none";
            document.body.style.overflow = "auto";
        }

        /* ---------- CATEGORY FILTER ---------- */
        chipRow.addEventListener("click", e => {
            if (e.target.classList.contains("chip")) {
                document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
                e.target.classList.add("active");

                renderServices(
                    e.target.dataset.category,
                    searchBar.value.toLowerCase()
                );
            }
        });

        /* ---------- SEARCH ---------- */
        searchBar.addEventListener("input", () => {
            const active = document.querySelector(".chip.active").dataset.category;
            renderServices(active, searchBar.value.toLowerCase());
        });

        /* ---------- CLOSE OVERLAY ON CLICK OUTSIDE ---------- */
        successOverlay.addEventListener("click", function(e) {
            if (e.target === successOverlay) {
                closeSuccess();
            }
        });

        /* ---------- CLOSE OVERLAY WITH ESC KEY ---------- */
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape" && successOverlay.style.display === "flex") {
                closeSuccess();
            }
        });

        /* ---------- INITIAL RENDER ---------- */
        renderServices();
    </script>
</body>
</html>
